<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nekrachni – Přehled pohybů</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime:   #A2E640;
      --purple: #67139F;
      --nøt:    #AD8CCB;
      --black:  #0E0E0E;
      --bg:     #f5f0fa;
    }

    body {
      background: var(--bg);
      font-family: 'Geologica', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px 48px;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      background: #faf8fd;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1c1c1e,
        0 0 0 12px #3a3a3c,
        0 32px 80px rgba(14,14,14,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 844px;
      position: relative;
    }

    /* ── Status bar ── */
    .status-bar {
      background: var(--black);
      color: var(--lime);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 10px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── App header ── */
    .app-header {
      background: var(--black);
      padding: 12px 20px 20px;
      color: #fff;
      flex-shrink: 0;
    }

    .bank-name {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bank-name .symbol   { color: var(--lime); font-size: 26px; }
    .bank-name .wordmark { color: #fff; }

    /* ── Profile switcher ── */
    .switcher {
      display: flex;
      background: #1e1e1e;
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 16px;
    }
    .switcher button {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      border-radius: 10px;
      padding: 9px 8px;
      cursor: pointer;
      font-family: 'Geologica', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, color 0.18s;
    }
    .switcher button.active {
      background: var(--lime);
      color: var(--black);
    }

    .av {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }
    .av-t { background: var(--purple); color: var(--lime); }
    .av-m { background: var(--nøt);   color: var(--black); }

    /* ── Account card ── */
    .account-card { display: flex; align-items: center; gap: 12px; }
    .av-lg {
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; flex-shrink: 0;
    }
    .account-card h2  { font-size: 18px; font-weight: 800; color: #fff; }
    .account-card .sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; font-weight: 400; }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #faf8fd;
    }
    .content::-webkit-scrollbar { width: 0; }

    /* ── Month label ── */
    .month-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 6px;
    }
    .month-label h3 {
      font-size: 11px; font-weight: 800; color: var(--purple);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .month-label .count { font-size: 11px; color: var(--nøt); font-weight: 600; }

    /* ── Transaction list ── */
    .tx-list { padding: 0 12px 12px; }
    .tx {
      display: flex; align-items: center;
      padding: 11px 8px;
      border-bottom: 1px solid rgba(103,19,159,0.07);
      gap: 12px;
    }
    .tx:last-child { border-bottom: none; }
    .tx-icon {
      width: 42px; height: 42px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name {
      font-size: 14px; font-weight: 600; color: var(--black);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tx-date  { font-size: 12px; color: var(--nøt); margin-top: 2px; font-weight: 400; }
    .tx-amount { font-size: 15px; font-weight: 800; flex-shrink: 0; }
    .tx-amount.in  { color: var(--purple); }
    .tx-amount.out { color: var(--black); }

    /* ── Bottom nav ── */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--black);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 22px;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: rgba(255,255,255,0.3);
      font-family: 'Geologica', sans-serif;
      font-size: 10px; font-weight: 700;
      cursor: pointer; background: none; border: none; padding: 0;
    }
    .nav-btn .ico { font-size: 22px; }
    .nav-btn.active { color: var(--lime); }
    .nav-btn.locked { color: rgba(255,255,255,0.2); cursor: pointer; }

    /* ── Code unlock overlay ── */
    .overlay {
      position: absolute; inset: 0;
      background: rgba(14,14,14,0.85);
      display: flex; align-items: flex-end;
      z-index: 100;
      backdrop-filter: blur(4px);
      border-radius: 48px; overflow: hidden;
    }
    .overlay.hidden { display: none; }

    .code-sheet {
      width: 100%;
      background: #1a1a1a;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 40px;
    }
    .code-sheet h3  { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .code-sheet p   { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 24px; font-weight: 400; }
    .code-input-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .code-input {
      flex: 1;
      background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Geologica', sans-serif;
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: 4px; text-transform: uppercase; outline: none;
      transition: border-color 0.18s;
    }
    .code-input:focus { border-color: var(--lime); }
    .code-input.error { border-color: #ef4444; animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .code-btn {
      background: var(--lime); border: none; border-radius: 12px;
      padding: 14px 20px;
      font-family: 'Geologica', sans-serif;
      font-size: 16px; font-weight: 900; color: var(--black);
      cursor: pointer; transition: opacity 0.15s;
    }
    .code-btn:hover { opacity: 0.88; }
    .code-error { font-size: 13px; color: #ef4444; font-weight: 600; min-height: 18px; }
    .overlay-close {
      display: block; width: 100%; margin-top: 16px;
      background: none; border: none;
      font-family: 'Geologica', sans-serif;
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3);
      cursor: pointer; text-align: center;
    }

    /* ══════════════════════════════════
       BUDGET VIEW
    ══════════════════════════════════ */
    .budget-view { padding: 16px 20px 28px; }

    /* ── Summary card ── */
    .budget-summary {
      background: var(--black);
      border-radius: 18px;
      padding: 18px 12px;
      margin-bottom: 20px;
      display: flex;
    }
    .summary-col { flex: 1; text-align: center; }
    .summary-col + .summary-col { border-left: 1px solid rgba(255,255,255,0.08); }
    .summary-label {
      font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px;
    }
    .summary-value { font-size: 15px; font-weight: 900; letter-spacing: -0.4px; }
    .summary-value.income    { color: var(--lime); }
    .summary-value.expense   { color: var(--nøt); }
    .summary-value.bal-plus  { color: var(--lime); }
    .summary-value.bal-minus { color: #ef4444; }

    /* ── Section title ── */
    .section-title {
      font-size: 11px; font-weight: 800; color: var(--purple);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; margin-top: 4px;
    }

    /* ── 50/30/20 block ── */
    .rule-block {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1.5px solid rgba(103,19,159,0.08);
    }
    .rule-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .donut-wrap { flex-shrink: 0; position: relative; width: 110px; height: 110px; }
    .donut-wrap svg { display: block; }
    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }
    .donut-center .dc-label { font-size: 9px; font-weight: 700; color: var(--nøt); text-transform: uppercase; letter-spacing: 0.5px; }
    .donut-center .dc-value { font-size: 13px; font-weight: 900; color: var(--black); line-height: 1.1; margin-top: 1px; }
    .donut-center .dc-value.deficit { color: #ef4444; font-size: 12px; }

    .rule-rows { flex: 1; display: flex; flex-direction: column; gap: 10px; }

    .rule-row {}
    .rule-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .rule-row-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; color: var(--black);
    }
    .rule-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rule-pcts { text-align: right; }
    .rule-actual { font-size: 13px; font-weight: 900; color: var(--black); line-height: 1; }
    .rule-target { font-size: 10px; font-weight: 600; color: var(--nøt); }

    .rule-track {
      height: 6px;
      border-radius: 99px;
      background: rgba(103,19,159,0.08);
      position: relative;
      overflow: visible;
    }
    .rule-fill {
      height: 100%;
      border-radius: 99px;
    }
    /* Target marker line */
    .rule-marker {
      position: absolute;
      top: -3px; bottom: -3px;
      width: 2px;
      border-radius: 1px;
      background: rgba(14,14,14,0.25);
    }

    .badge {
      font-size: 10px; font-weight: 800;
      padding: 2px 6px; border-radius: 20px; margin-left: 4px;
    }
    .badge.ok   { background: rgba(162,230,64,0.2);  color: #3d6e00; }
    .badge.over { background: rgba(239,68,68,0.12);  color: #b91c1c; }
    .badge.low  { background: rgba(239,68,68,0.12);  color: #b91c1c; }

    /* ── Category bars ── */
    .cat-block { margin-bottom: 18px; }
    .cat-block-title {
      font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .cat-block-title .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    .bar-list { display: flex; flex-direction: column; gap: 10px; }
    .bar-row  {}
    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .bar-cat    { font-size: 13px; font-weight: 700; color: var(--black); }
    .bar-amount { font-size: 12px; font-weight: 800; color: var(--black); }
    .bar-track  { height: 8px; background: rgba(103,19,159,0.08); border-radius: 99px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 99px; }

    /* ── Hidden ── */
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      body { padding: 0; background: #faf8fd; }
      .phone { width: 100%; border-radius: 0; box-shadow: none; height: 100dvh; }
      .overlay { border-radius: 0; }
    }
  </style>
</head>

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n) {
    return Math.abs(n).toLocaleString('cs-CZ') + '\u00a0Kč';
  }
  function pct(val, total) {
    return Math.round((val / total) * 100);
  }

  // ── Donut SVG ──────────────────────────────────────────────────────────────
  function donutSVG(segments) {
    // segments: [{pct: 0..1, color}]  (pct values must sum ≤ 1)
    const cx = 55, cy = 55, r = 42, sw = 14;
    const C = 2 * Math.PI * r;
    const GAP = 2.5;

    let cumulative = 0;
    const arcs = segments.filter(s => s.pct > 0.005).map(s => {
      const dash   = Math.max(0, s.pct * C - GAP);
      const offset = -(cumulative * C);
      cumulative  += s.pct;
      return `<circle cx="${cx}" cy="${cy}" r="${r}"
        fill="none" stroke="${s.color}" stroke-width="${sw}"
        stroke-dasharray="${dash.toFixed(2)} ${(C - dash).toFixed(2)}"
        stroke-dashoffset="${offset.toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"
        stroke-linecap="butt"/>`;
    }).join('\n    ');

    return `<svg viewBox="0 0 110 110" width="110" height="110">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="rgba(103,19,159,0.07)" stroke-width="${sw}"/>
    ${arcs}
  </svg>`;
  }

  // ── Badge helper ───────────────────────────────────────────────────────────
  function badge(actual, target) {
    const diff = actual - target;
    if (Math.abs(diff) <= 3) return `<span class="badge ok">✓ OK</span>`;
    if (diff > 0)            return `<span class="badge over">↑ +${diff}%</span>`;
    return                          `<span class="badge low">↓ ${diff}%</span>`;
  }

  // ── Render budget ──────────────────────────────────────────────────────────
  function renderBudget(profile) {
    const b       = BUDGET[profile];
    const income  = b.income;
    const needsAmt  = b.needs.total;
    const wantsAmt  = b.wants.total;
    const savingsAmt = income - needsAmt - wantsAmt;
    const isDeficit  = savingsAmt < 0;

    const needsPct_r   = needsAmt  / income;
    const wantsPct_r   = wantsAmt  / income;
    const savingsPct_r = Math.max(0, savingsAmt / income);

    const needsPct_d   = Math.round(needsPct_r   * 100);
    const wantsPct_d   = Math.round(wantsPct_r   * 100);
    const savingsPct_d = isDeficit ? 0 : Math.round(savingsPct_r * 100);

    // Donut segments
    const total_d = needsPct_r + wantsPct_r + savingsPct_r;
    const segments = [
      { pct: needsPct_r  / total_d, color: '#67139F' },
      { pct: wantsPct_r  / total_d, color: '#A2E640' },
      { pct: savingsPct_r / total_d, color: '#AD8CCB' },
    ];

    // Center label
    const centerHTML = isDeficit
      ? `<div class="dc-label">zůstatek</div><div class="dc-value deficit">DEFICIT<br>${fmt(Math.abs(savingsAmt))}</div>`
      : `<div class="dc-label">spoření</div><div class="dc-value">${savingsPct_d}%<br><span style="font-size:10px;color:var(--nøt)">${fmt(savingsAmt)}</span></div>`;

    // Rule rows
    function ruleRow(label, dot, actual, target) {
      const barW = Math.min(100, actual);
      const markW = Math.min(100, target);
      return `
        <div class="rule-row">
          <div class="rule-row-top">
            <div class="rule-row-label">
              <div class="rule-dot" style="background:${dot}"></div>
              ${label}
            </div>
            <div class="rule-pcts">
              <div class="rule-actual">${actual}% ${badge(actual, target)}</div>
              <div class="rule-target">cíl: ${target}%</div>
            </div>
          </div>
          <div class="rule-track">
            <div class="rule-fill" style="width:${barW}%; background:${dot}; opacity:0.85"></div>
            <div class="rule-marker" style="left:${markW}%"></div>
          </div>
        </div>`;
    }

    // Category bars
    function catBars(cats) {
      const max = Math.max(...cats.map(c => c.amount));
      return cats.map(c => `
        <div class="bar-row">
          <div class="bar-meta">
            <span class="bar-cat">${c.name}</span>
            <span class="bar-amount">${fmt(c.amount)}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(c.amount/max*100)}%; background:${c.color}"></div>
          </div>
        </div>`).join('');
    }

    const balClass = isDeficit ? 'bal-minus' : 'bal-plus';
    const balSign  = isDeficit ? '−' : '+';

    document.getElementById(`bv-${profile}`).innerHTML = `
      <!-- Summary -->
      <div class="budget-summary">
        <div class="summary-col">
          <div class="summary-label">Příjmy</div>
          <div class="summary-value income">+${fmt(income)}</div>
        </div>
        <div class="summary-col">
          <div class="summary-label">Výdaje</div>
          <div class="summary-value expense">−${fmt(needsAmt + wantsAmt)}</div>
        </div>
        <div class="summary-col">
          <div class="summary-label">Zůstatek</div>
          <div class="summary-value ${balClass}">${balSign}${fmt(Math.abs(savingsAmt))}</div>
        </div>
      </div>

      <!-- 50/30/20 -->
      <div class="section-title">Pravidlo 50 / 30 / 20</div>
      <div class="rule-block">
        <div class="rule-inner">
          <div class="donut-wrap">
            ${donutSVG(segments)}
            <div class="donut-center">${centerHTML}</div>
          </div>
          <div class="rule-rows">
            ${ruleRow('Nezbytné', '#67139F', needsPct_d,  50)}
            ${ruleRow('Zbytné',   '#A2E640', wantsPct_d,  30)}
            ${ruleRow('Spoření',  '#AD8CCB', savingsPct_d, 20)}
          </div>
        </div>
      </div>

      <!-- Nezbytné výdaje -->
      <div class="cat-block">
        <div class="cat-block-title" style="color:#67139F">
          <div class="dot" style="background:#67139F"></div>
          Nezbytné výdaje &nbsp;·&nbsp; ${fmt(needsAmt)}
        </div>
        <div class="bar-list">${catBars(b.needs.cats)}</div>
      </div>

      <!-- Zbytné výdaje -->
      <div class="cat-block">
        <div class="cat-block-title" style="color:#3d6e00">
          <div class="dot" style="background:#A2E640"></div>
          Zbytné výdaje &nbsp;·&nbsp; ${fmt(wantsAmt)}
        </div>
        <div class="bar-list">${catBars(b.wants.cats)}</div>
      </div>
    `;
  }

  // ── Render transactions ────────────────────────────────────────────────────
  function renderTx(data, listId, countId) {
    document.getElementById(countId).textContent = data.length + ' pohybů';
    document.getElementById(listId).innerHTML = data.map(tx => `

        <div class="tx-icon" style="background:${tx.bg}">${tx.icon}</div>

          <div class="tx-name">${tx.name}</div>
          <div class="tx-date">${tx.date}</div>
        </div>
        <div class="tx-amount ${tx.amount > 0 ? 'in' : 'out'}">
          ${tx.amount > 0 ? '+' : '−'}${fmt(tx.amount)}
        </div>
      </div>`).join('');
  }

  // ── View management ────────────────────────────────────────────────────────
  function updateView() {
    ['tomas','marketa'].forEach(p => {
      ['pohyby','rozpocet'].forEach(t => {
        const el = document.getElementById(`${t}-${p}`);
        if (el) el.classList.toggle('hidden', !(p === activeProfile && t === activeTab));
      });
      document.getElementById(`info-${p}`).classList.toggle('hidden', p !== activeProfile);
      document.getElementById(`tab-${p}`).classList.toggle('active', p === activeProfile);
    });

    document.getElementById('nav-pohyby').classList.toggle('active', activeTab === 'pohyby');

    const navR = document.getElementById('nav-rozpocet');
    navR.classList.toggle('active', unlocked && activeTab === 'rozpocet');
    navR.classList.toggle('locked', !unlocked);
    navR.innerHTML = unlocked
      ? '<span class="ico">&#128200;</span>Rozpočet'
      : '<span class="ico">&#128274;</span>Rozpočet';

    document.querySelector('.content').scrollTop = 0;
  }

  function switchProfile(profile) { activeProfile = profile; updateView(); }
  function switchTab(tab)         { activeTab = tab;          updateView(); }

  function handleRozpocetClick() {
    if (unlocked) {
      switchTab('rozpocet');
    } else {
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('code-input').value = '';
      document.getElementById('code-error').textContent = '';
      setTimeout(() => document.getElementById('code-input').focus(), 100);
    }
  }

  function checkCode() {
    const input = document.getElementById('code-input');
    const error = document.getElementById('code-error');
    if (input.value.trim() === SECRET_CODE) {
      unlocked = true;
      document.getElementById('overlay').classList.add('hidden');
      activeTab = 'rozpocet';
      updateView();
    } else {
      error.textContent = 'Nesprávný kód. Zkus to znovu.';
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }

  function closeOverlay() { document.getElementById('overlay').classList.add('hidden'); }

  // ── Init ───────────────────────────────────────────────────────────────────
  renderTx(TOMAS,   'list-tomas',   'count-tomas');
  renderTx(MARKETA, 'list-marketa', 'count-marketa');
  renderBudget('tomas');
