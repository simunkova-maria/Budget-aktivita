<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nekrachni – Přehled pohybů</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lime:   #A2E640;
      --purple: #67139F;
      --nøt:    #AD8CCB;
      --black:  #0E0E0E;
      --bg:     #f5f0fa;
    }

    body {
      background: var(--bg);
      font-family: 'Geologica', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px 48px;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      background: #faf8fd;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1c1c1e,
        0 0 0 12px #3a3a3c,
        0 32px 80px rgba(14,14,14,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 844px;
      position: relative;
    }

    /* ── Status bar ── */
    .status-bar {
      background: var(--black);
      color: var(--lime);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 10px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── App header ── */
    .app-header {
      background: var(--black);
      padding: 12px 20px 20px;
      color: #fff;
      flex-shrink: 0;
    }

    .bank-name {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bank-name .symbol  { color: var(--lime); font-size: 26px; }
    .bank-name .wordmark { color: #fff; }

    /* ── Profile switcher ── */
    .switcher {
      display: flex;
      background: #1e1e1e;
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 16px;
    }

    .switcher button {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      border-radius: 10px;
      padding: 9px 8px;
      cursor: pointer;
      font-family: 'Geologica', sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, color 0.18s;
    }
    .switcher button.active {
      background: var(--lime);
      color: var(--black);
    }

    .av {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }
    .av-t { background: var(--purple); color: var(--lime); }
    .av-m { background: var(--nøt);   color: var(--black); }

    /* ── Account card ── */
    .account-card {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .av-lg {
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
      flex-shrink: 0;
    }
    .account-card h2 { font-size: 18px; font-weight: 800; color: #fff; line-height: 1.2; }
    .account-card .sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; font-weight: 400; }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #faf8fd;
    }
    .content::-webkit-scrollbar { width: 0; }

    /* ── Month label ── */
    .month-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 6px;
    }
    .month-label h3 {
      font-size: 11px; font-weight: 800;
      color: var(--purple);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .month-label .count { font-size: 11px; color: var(--nøt); font-weight: 600; }

    /* ── Transaction list ── */
    .tx-list { padding: 0 12px 12px; }

    .tx {
      display: flex;
      align-items: center;
      padding: 11px 8px;
      border-bottom: 1px solid rgba(103,19,159,0.07);
      gap: 12px;
    }
    .tx:last-child { border-bottom: none; }

    .tx-icon {
      width: 42px; height: 42px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name {
      font-size: 14px; font-weight: 600; color: var(--black);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tx-date { font-size: 12px; color: var(--nøt); margin-top: 2px; font-weight: 400; }
    .tx-amount { font-size: 15px; font-weight: 800; flex-shrink: 0; letter-spacing: -0.3px; }
    .tx-amount.in  { color: var(--purple); }
    .tx-amount.out { color: var(--black); }

    /* ── Bottom nav ── */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--black);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 22px;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: rgba(255,255,255,0.3);
      font-family: 'Geologica', sans-serif;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .nav-btn .ico { font-size: 22px; }
    .nav-btn.active { color: var(--lime); }
    .nav-btn.locked { color: rgba(255,255,255,0.2); cursor: pointer; }

    /* ── Code unlock overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(14,14,14,0.85);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      backdrop-filter: blur(4px);
      border-radius: 48px;
      overflow: hidden;
    }
    .overlay.hidden { display: none; }

    .code-sheet {
      width: 100%;
      background: #1a1a1a;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 40px;
    }
    .code-sheet h3 {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
    }
    .code-sheet p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 24px;
      font-weight: 400;
    }

    .code-input-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .code-input {
      flex: 1;
      background: #2a2a2a;
      border: 2px solid #3a3a3a;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Geologica', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.18s;
    }
    .code-input:focus { border-color: var(--lime); }
    .code-input.error { border-color: #ef4444; animation: shake 0.3s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .code-btn {
      background: var(--lime);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-family: 'Geologica', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--black);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .code-btn:hover { opacity: 0.88; }

    .code-error {
      font-size: 13px;
      color: #ef4444;
      font-weight: 600;
      min-height: 18px;
    }

    .overlay-close {
      display: block;
      width: 100%;
      margin-top: 16px;
      background: none;
      border: none;
      font-family: 'Geologica', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      text-align: center;
    }

    /* ── Budget view ── */
    .budget-view { padding: 16px 20px 24px; }

    .budget-summary {
      background: var(--black);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 0;
    }
    .summary-col {
      flex: 1;
      text-align: center;
    }
    .summary-col + .summary-col {
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    .summary-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }
    .summary-value {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .summary-value.income  { color: var(--lime); }
    .summary-value.expense { color: var(--nøt); }
    .summary-value.balance-pos { color: var(--lime); }
    .summary-value.balance-neg { color: #ef4444; }

    .budget-section-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ── Bar chart ── */
    .bar-list { display: flex; flex-direction: column; gap: 12px; }

    .bar-row { display: flex; flex-direction: column; gap: 4px; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .bar-cat {
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
    }
    .bar-amount {
      font-size: 13px;
      font-weight: 800;
      color: var(--black);
    }

    .bar-track {
      height: 10px;
      background: rgba(103,19,159,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    /* ── Hidden util ── */
    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      body { padding: 0; background: #faf8fd; }
      .phone {
        width: 100%; border-radius: 0;
        box-shadow: none; height: 100dvh;
      }
      .overlay { border-radius: 0; }
    }
  </style>
</head>

      cats: [
        { name: "Bydlení",            amount: 13300, color: "#67139F" },
        { name: "Potraviny",          amount:  3500, color: "#A2E640" },
        { name: "Oblečení",           amount:  1290, color: "#c084fc" },
        { name: "Zdraví & krása",     amount:  1160, color: "#AD8CCB" },
        { name: "Stravování venku",   amount:  1110, color: "#f97316" },
        { name: "Telefon & internet", amount:  1148, color: "#34d399" },
        { name: "Sport",              amount:   799, color: "#818cf8" },
        { name: "Zábava",             amount:   768, color: "#60a5fa" },
        { name: "Doprava",            amount:   550, color: "#f472b6" },
      ]
    }
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n) {
    return Math.abs(n).toLocaleString('cs-CZ') + '\u00a0Kč';
  }

  // ── Render transactions ────────────────────────────────────────────────────
  function renderTx(data, listId, countId) {
    document.getElementById(countId).textContent = data.length + ' pohybů';
    document.getElementById(listId).innerHTML = data.map(tx => `
      <div class="tx">
        <div class="tx-icon" style="background:${tx.bg}">${tx.icon}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.name}</div>
          <div class="tx-date">${tx.date}</div>
        </div>
        <div class="tx-amount ${tx.amount > 0 ? 'in' : 'out'}">
          ${tx.amount > 0 ? '+' : '−'}${fmt(tx.amount)}
        </div>
      </div>
    `).join('');
  }

  // ── Render budget ──────────────────────────────────────────────────────────
  function renderBudget(profile) {
    const b       = BUDGET[profile];
    const balance = b.income - b.expense;
    const maxAmt  = Math.max(...b.cats.map(c => c.amount));
    const balClass = balance >= 0 ? 'balance-pos' : 'balance-neg';
    const balSign  = balance >= 0 ? '+' : '−';

    const bars = b.cats.map(c => {
      const pct = Math.round((c.amount / maxAmt) * 100);
      return `
        <div class="bar-row">
          <div class="bar-meta">
            <span class="bar-cat">${c.name}</span>
            <span class="bar-amount">${fmt(c.amount)}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%; background:${c.color}"></div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById(`budget-content-${profile}`).innerHTML = `
      <div class="budget-summary">
        <div class="summary-col">
          <div class="summary-label">Příjmy</div>
          <div class="summary-value income">+${fmt(b.income)}</div>
        </div>
        <div class="summary-col">
          <div class="summary-label">Výdaje</div>
          <div class="summary-value expense">−${fmt(b.expense)}</div>
        </div>
        <div class="summary-col">
          <div class="summary-label">Zůstatek</div>
          <div class="summary-value ${balClass}">${balSign}${fmt(Math.abs(balance))}</div>
        </div>
      </div>
      <div class="budget-section-title">Výdaje podle kategorií</div>
      <div class="bar-list">${bars}</div>
    `;
  }

  // ── Show/hide panels ───────────────────────────────────────────────────────
  function updateView() {
    const profiles = ['tomas', 'marketa'];
    const tabs     = ['pohyby', 'rozpocet'];

    profiles.forEach(p => {
      tabs.forEach(t => {
        const el = document.getElementById(`${t}-${p}`);
        if (el) el.classList.toggle('hidden',
          !(p === activeProfile && t === activeTab));
      });
    });

    document.getElementById('info-tomas').classList.toggle('hidden',   activeProfile !== 'tomas');
    document.getElementById('info-marketa').classList.toggle('hidden', activeProfile !== 'marketa');

    document.getElementById('tab-tomas').classList.toggle('active',   activeProfile === 'tomas');
    document.getElementById('tab-marketa').classList.toggle('active', activeProfile === 'marketa');

    document.getElementById('nav-pohyby').classList.toggle('active',  activeTab === 'pohyby');

    const navR = document.getElementById('nav-rozpocet');
    navR.classList.toggle('active',  unlocked && activeTab === 'rozpocet');
    navR.classList.toggle('locked',  !unlocked);
    navR.innerHTML = unlocked
      ? '<span class="ico">&#128200;</span>Rozpočet'
      : '<span class="ico">&#128274;</span>Rozpočet';

    document.querySelector('.content').scrollTop = 0;
  }

  // ── Switch profile ─────────────────────────────────────────────────────────
  function switchProfile(profile) {
    activeProfile = profile;
    updateView();
  }

  // ── Switch tab ─────────────────────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    updateView();
  }

  // ── Rozpočet click ─────────────────────────────────────────────────────────
  function handleRozpocetClick() {
    if (unlocked) {
      switchTab('rozpocet');
    } else {
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('code-input').value = '';
      document.getElementById('code-error').textContent = '';
      setTimeout(() => document.getElementById('code-input').focus(), 100);
    }
  }

  // ── Code check ─────────────────────────────────────────────────────────────
  function checkCode() {
    const input = document.getElementById('code-input');
    const error = document.getElementById('code-error');

    if (input.value.trim() === SECRET_CODE) {
      unlocked = true;
      document.getElementById('overlay').classList.add('hidden');
      activeTab = 'rozpocet';
      updateView();
    } else {
      error.textContent = 'Nesprávný kód. Zkus to znovu.';
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.add('hidden');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  renderTx(TOMAS,   'list-tomas',   'count-tomas');
  renderTx(MARKETA, 'list-marketa', 'count-marketa');
  renderBudget('tomas');
  renderBudget('marketa');
  updateView();
</script>
</body>
</html>
