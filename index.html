<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBank – Přehled pohybů</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8edf5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px 48px;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      background: #f9fafb;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1c1c1e,
        0 0 0 12px #3a3a3c,
        0 32px 80px rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 844px;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #0f2d6b;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 10px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── App header ── */
    .app-header {
      background: linear-gradient(150deg, #0f2d6b 0%, #1d4ed8 100%);
      padding: 14px 20px 20px;
      color: #fff;
      flex-shrink: 0;
    }

    .bank-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }
    .bank-name em { color: #93c5fd; font-style: normal; }

    /* ── Profile switcher ── */
    .switcher {
      display: flex;
      background: rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 16px;
    }

    .switcher button {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      border-radius: 10px;
      padding: 9px 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.18s, color 0.18s;
    }

    .switcher button.active {
      background: #fff;
      color: #0f2d6b;
    }

    .av {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }
    .av-t { background: #fbbf24; color: #78350f; }
    .av-m { background: #f472b6; color: #831843; }

    /* ── Account card ── */
    .account-card {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .av-lg {
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800;
      flex-shrink: 0;
    }

    .account-card h2 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .account-card .sub {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 3px;
    }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content::-webkit-scrollbar { width: 0; }

    /* ── Month label ── */
    .month-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 6px;
    }
    .month-label h3 {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .month-label .count {
      font-size: 11px;
      color: #9ca3af;
    }

    /* ── Transaction list ── */
    .tx-list { padding: 0 12px 12px; }

    .tx {
      display: flex;
      align-items: center;
      padding: 11px 8px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .tx:last-child { border-bottom: none; }

    .tx-icon {
      width: 42px; height: 42px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .tx-info { flex: 1; min-width: 0; }

    .tx-name {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-date {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .tx-amount {
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: -0.3px;
    }
    .tx-amount.in  { color: #059669; }
    .tx-amount.out { color: #dc2626; }

    /* ── Bottom nav ── */
    .bottom-nav {
      flex-shrink: 0;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 22px;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: #9ca3af;
      font-size: 10px;
      font-weight: 600;
    }
    .nav-btn .ico { font-size: 22px; }
    .nav-btn.active { color: #1d4ed8; }

    /* ── Hidden util ── */
    .hidden { display: none !important; }

    /* ── Responsive: full-screen on real phones ── */
    @media (max-width: 440px) {
      body { padding: 0; background: #f9fafb; }
      .phone {
        width: 100%; border-radius: 0;
        box-shadow: none;
        height: 100dvh;
      }
    }
  </style>
</head>
<body>

  <!-- Scrollable content -->

  <!-- Bottom nav -->

    <div class="nav-btn"><span class="ico">&#8599;</span>Platba</div>

  // ── Render ────────────────────────────────────────────────────────────────

  function fmt(n) {
    return Math.abs(n).toLocaleString('cs-CZ') + '\u00a0Kč';
  }

  function render(data, listId, countId) {
    const list  = document.getElementById(listId);
    const count = document.getElementById(countId);

    count.textContent = data.length + ' pohybů';

    list.innerHTML = data.map(tx => `
      <div class="tx">
        <div class="tx-icon" style="background:${tx.bg}">${tx.icon}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.name}</div>
          <div class="tx-date">${tx.date}</div>
        </div>
        <div class="tx-amount ${tx.amount > 0 ? 'in' : 'out'}">
          ${tx.amount > 0 ? '+' : '−'}${fmt(tx.amount)}
        </div>
      </div>
    `).join('');
  }

  // ── Switch ────────────────────────────────────────────────────────────────

  function switchProfile(who) {
    const isT = who === 'tomas';

    document.getElementById('tab-tomas').classList.toggle('active', isT);
    document.getElementById('tab-marketa').classList.toggle('active', !isT);

    document.getElementById('info-tomas').classList.toggle('hidden', !isT);
    document.getElementById('info-marketa').classList.toggle('hidden', isT);

    document.getElementById('view-tomas').classList.toggle('hidden', !isT);
    document.getElementById('view-marketa').classList.toggle('hidden', isT);

    // Scroll back to top on switch
    document.querySelector('.content').scrollTop = 0;
  }

</html>
